services:
  # --- Kong API gateway (behind Traefik — single domain) ---
  kong:
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kong.rule=Host(`${SITE_DOMAIN}`) && (PathPrefix(`/auth/v1`) || PathPrefix(`/rest/v1`) || PathPrefix(`/functions/v1`) || PathPrefix(`/realtime/v1`) || PathPrefix(`/storage/v1`))"
      - "traefik.http.routers.kong.entrypoints=websecure"
      - "traefik.http.routers.kong.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kong.priority=100"
      - "traefik.http.routers.kong.middlewares=kong-headers"
      - "traefik.http.middlewares.kong-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.services.kong.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik"
    networks:
      - traefik

  # --- Postgres Meta (must share traefik network so Studio can reach it) ---
  meta:
    restart: unless-stopped
    networks:
      default:
        aliases:
          - meta
      traefik:
        aliases:
          - meta

  # --- Auth SMTP ---
  auth:
    restart: unless-stopped
    environment:
      - GOTRUE_SMTP_HOST=web.tentacle.fi
      - GOTRUE_SMTP_PORT=587
      - GOTRUE_SMTP_USER=taika@lsp.fi
      - GOTRUE_SMTP_PASS=25jfqi492814dwq!
      - GOTRUE_SMTP_ADMIN_EMAIL=taika@lsp.fi
      - GOTRUE_SMTP_SENDER_NAME=Taika Työajanseuranta
      - GOTRUE_MAILER_AUTOCONFIRM=false
      - GOTRUE_MAILER_EXTERNAL_HOSTS=https://taika.integral.fi

  # --- Core services reliability ---
  db:
    restart: unless-stopped
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rest:
    restart: unless-stopped

  studio:
    restart: unless-stopped

  # --- Traefik reverse proxy with HTTPS ---
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.45
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=120s"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=120s"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - /opt/timetrack/traefik-config:/etc/traefik/dynamic:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - traefik

networks:
  traefik:
    name: traefik

volumes:
  traefik-certs:
